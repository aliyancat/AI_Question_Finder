<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Paper Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .source-title {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-weight: 600;
            color: #333;
        }
        
        .question-item {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 22px 24px;
            margin-bottom: 18px;
            transition: all 0.25s ease;
        }
        
        .question-item:hover {
            border-color: #667eea;
            box-shadow: 0 8px 26px rgba(102, 126, 234, 0.12);
            transform: translateY(-2px);
        }
        
        .question-text {
            color: #212121;
            font-size: 1em;
            line-height: 1.7;
            word-break: break-word;
        }
        
        .question-meta {
            font-size: 0.95em;
            color: #667eea;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }
        
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .button-primary {
            background: #667eea;
            color: white;
        }
        
        .button-secondary {
            background: #f5f7ff;
            color: #333;
            border: 1px solid #dbe3ff;
        }
        
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 22px rgba(102, 126, 234, 0.15);
        }
        
        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .no-match {
            text-align: center;
            padding: 60px 30px;
            color: #999;
            font-size: 1.2em;
        }
        
        .footer {
            background: #f8f9ff;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 0.95em;
            border-top: 1px solid #e0e0e0;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Past Paper Questions</h1>
            <p>Click a question to open the PDF; use the second button for marking schemes.</p>
        </div>
        
        <div class="content">
<div class="no-match">No questions match the syllabus.</div>
        </div>
        
        <div class="footer">
            Generated by PaperCode | Open questions and marking schemes locally
        </div>
    </div>
</body>
</html>
